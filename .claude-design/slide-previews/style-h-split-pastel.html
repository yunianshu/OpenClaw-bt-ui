<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 知识图谱 - Style H: Split Pastel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pastel-pink: #ffd6e0;
      --pastel-blue: #c4d7f2;
      --accent-coral: #ff8a80;
      --white-card: #ffffff;
      --text-dark: #2d2d3a;
      --text-muted: #6b6b80;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-pink) 50%, var(--pastel-blue) 50%, var(--pastel-blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    .slide {
      width: min(96vw, 1100px);
      height: min(90vh, 620px);
      background: var(--white-card);
      border-radius: clamp(12px, 2vw, 24px);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.08),
        0 1px 3px rgba(0, 0, 0, 0.04);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: scale(0.96);
      animation: slideReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideReveal {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .slide::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: var(--accent-coral);
      border-radius: 50%;
      opacity: 0;
      animation: blobReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      z-index: 0;
    }

    .slide::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 280px;
      height: 280px;
      background: var(--pastel-blue);
      border-radius: 50%;
      opacity: 0;
      animation: blobReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
      z-index: 0;
    }

    @keyframes blobReveal {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 0.35;
        transform: scale(1);
      }
    }

    .left-panel {
      padding: clamp(32px, 5vw, 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, rgba(255, 214, 224, 0.15) 0%, transparent 70%);
    }

    .right-panel {
      padding: clamp(32px, 5vw, 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      z-index: 1;
      background: linear-gradient(200deg, rgba(196, 215, 242, 0.15) 0%, transparent 70%);
    }

    .title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: clamp(8px, 1.5vw, 14px);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    .subtitle {
      font-family: 'Josefin Sans', sans-serif;
      font-size: clamp(14px, 2.2vw, 22px);
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: clamp(40px, 6vw, 70px);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    }

    .keywords {
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 2vw, 20px);
    }

    .keyword-item {
      font-family: 'Josefin Sans', sans-serif;
      font-size: clamp(16px, 2.5vw, 24px);
      font-weight: 600;
      color: var(--text-dark);
      padding-left: clamp(12px, 1.8vw, 18px);
      border-left: 3px solid var(--accent-coral);
      opacity: 0;
      transform: translateX(-20px);
    }

    .keyword-item:nth-child(1) { animation: fadeLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards; }
    .keyword-item:nth-child(2) { animation: fadeLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards; }
    .keyword-item:nth-child(3) { animation: fadeLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.0s forwards; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeLeft {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .section-label {
      font-size: clamp(10px, 1.2vw, 13px);
      font-weight: 500;
      color: var(--accent-coral);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: clamp(16px, 2.5vw, 28px);
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    }

    .feature-tags {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(10px, 1.5vw, 16px);
    }

    .tag {
      background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-blue) 100%);
      color: var(--text-dark);
      font-family: 'Josefin Sans', sans-serif;
      font-size: clamp(13px, 1.8vw, 18px);
      font-weight: 600;
      padding: clamp(10px, 1.5vw, 16px) clamp(18px, 2.5vw, 30px);
      border-radius: 50px;
      box-shadow: 0 2px 10px rgba(255, 138, 128, 0.2);
      opacity: 0;
      transform: scale(0.85) translateY(10px);
      cursor: default;
    }

    .tag:nth-child(1) { animation: tagPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards; }
    .tag:nth-child(2) { animation: tagPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.25s forwards; }
    .tag:nth-child(3) { animation: tagPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.4s forwards; }

    @keyframes tagPop {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .bottom-label {
      position: absolute;
      bottom: clamp(12px, 2vw, 20px);
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(9px, 1.1vw, 12px);
      color: var(--text-muted);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.6s forwards;
      white-space: nowrap;
    }

    .divider-abstract {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(40px, 6vw, 70px);
      height: clamp(40px, 6vw, 70px);
      opacity: 0;
      animation: fadeUp 0.6s ease 1.2s forwards;
      z-index: 2;
    }

    .divider-abstract::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-coral);
      border-radius: 50%;
      opacity: 0.9;
    }

    .divider-abstract::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: var(--white-card);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="left-panel">
      <h1 class="title">OpenClaw 知识图谱</h1>
      <p class="subtitle">从部署到实践全指南</p>
      <div class="keywords">
        <span class="keyword-item">Gateway</span>
        <span class="keyword-item">Channel</span>
        <span class="keyword-item">Node</span>
      </div>
    </div>

    <div class="right-panel">
      <span class="section-label">核心特性</span>
      <div class="feature-tags">
        <span class="tag">开源免费</span>
        <span class="tag">多平台</span>
        <span class="tag">可执行</span>
      </div>
    </div>

    <div class="divider-abstract"></div>
    <span class="bottom-label">Style H: Split Pastel &middot; Playful modern</span>
  </div>
</body>
</html>
