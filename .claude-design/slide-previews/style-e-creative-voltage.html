<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 知识图谱 - Creative Voltage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #0f0f0f;
      --yellow: #f5e642;
      --pink: #ff2d7c;
      --white: #ffffff;
      --font-display: 'Righteous', cursive;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-dark);
      font-family: var(--font-body);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide {
      width: min(100vw, 100vh * 1.6);
      height: min(100vh, 100vw / 1.6);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3vh, 2rem);
      overflow: hidden;
    }

    /* Floating geometric shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .shape--circle-yellow {
      width: clamp(60px, 12vw, 140px);
      height: clamp(60px, 12vw, 140px);
      background: var(--yellow);
      top: 8%;
      left: 5%;
      animation-delay: 0.2s;
    }

    .shape--circle-pink {
      width: clamp(40px, 8vw, 90px);
      height: clamp(40px, 8vw, 90px);
      background: var(--pink);
      bottom: 15%;
      right: 8%;
      animation-delay: 0.4s;
    }

    .shape--square-yellow {
      width: clamp(30px, 6vw, 70px);
      height: clamp(30px, 6vw, 70px);
      background: var(--yellow);
      top: 12%;
      right: 12%;
      border-radius: 8px;
      transform: rotate(15deg);
      animation-delay: 0.3s;
    }

    .shape--square-pink {
      width: clamp(25px, 5vw, 55px);
      height: clamp(25px, 5vw, 55px);
      background: var(--pink);
      bottom: 20%;
      left: 10%;
      border-radius: 6px;
      transform: rotate(-20deg);
      animation-delay: 0.5s;
    }

    .shape--dot-row {
      width: clamp(80px, 15vw, 180px);
      height: clamp(12px, 2vw, 24px);
      background: repeating-linear-gradient(
        90deg,
        var(--yellow) 0px,
        var(--yellow) clamp(6px, 1vw, 12px),
        transparent clamp(6px, 1vw, 12px),
        transparent clamp(12px, 2vw, 24px)
      );
      top: 75%;
      right: 5%;
      border-radius: 0;
      animation-delay: 0.6s;
    }

    .shape--ring {
      width: clamp(50px, 10vw, 110px);
      height: clamp(50px, 10vw, 110px);
      border: clamp(4px, 0.8vw, 8px) solid var(--pink);
      background: transparent;
      bottom: 10%;
      left: 20%;
      animation-delay: 0.7s;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: scale(0) rotate(0deg);
      }
      60% {
        opacity: 1;
        transform: scale(1.2) rotate(10deg);
      }
      100% {
        opacity: 0.85;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: translateY(clamp(30px, 5vh, 60px)) scale(0.9);
      }
      60% {
        transform: translateY(clamp(-10px, -2vh, -20px)) scale(1.02);
      }
      80% {
        transform: translateY(clamp(5px, 1vh, 10px)) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.85;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    .content {
      text-align: center;
      z-index: 10;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .tag-line {
      font-family: var(--font-body);
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      font-weight: 500;
      letter-spacing: clamp(0.15em, 0.3vw, 0.25em);
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: clamp(0.5rem, 1.5vh, 1rem);
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
    }

    .title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: clamp(0.3rem, 1vh, 0.6rem);
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
    }

    .title-accent {
      color: var(--yellow);
      display: inline-block;
      position: relative;
    }

    .title-accent::after {
      content: '';
      position: absolute;
      bottom: clamp(-4px, -0.8vh, -8px);
      left: 0;
      width: 100%;
      height: clamp(3px, 0.6vh, 6px);
      background: var(--pink);
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left;
      animation: underlineIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
    }

    @keyframes underlineIn {
      to {
        transform: scaleX(1);
      }
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: clamp(1rem, 2.5vw, 1.8rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: clamp(1.5rem, 4vh, 3rem);
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
    }

    .features {
      display: flex;
      gap: clamp(0.8rem, 2vw, 1.5rem);
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
    }

    .feature-pill {
      font-family: var(--font-body);
      font-size: clamp(0.75rem, 1.8vw, 1.1rem);
      font-weight: 700;
      padding: clamp(0.5rem, 1.2vh, 0.9rem) clamp(1rem, 2.5vw, 1.8rem);
      border-radius: 50px;
      border: clamp(2px, 0.4vw, 3px) solid var(--yellow);
      color: var(--yellow);
      background: transparent;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: default;
    }

    .feature-pill:nth-child(2) {
      border-color: var(--pink);
      color: var(--pink);
    }

    .feature-pill::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    .feature-pill:hover::before {
      left: 100%;
    }

    .feature-pill:hover {
      transform: translateY(clamp(-2px, -0.5vh, -4px)) scale(1.05);
      box-shadow: 0 clamp(4px, 1vh, 10px) rgba(245, 230, 66, 0.3);
    }

    .feature-pill:nth-child(2):hover {
      box-shadow: 0 clamp(4px, 1vh, 10px) rgba(255, 45, 124, 0.3);
    }

    .label {
      position: absolute;
      bottom: clamp(0.8rem, 2vh, 1.5rem);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: clamp(0.55rem, 1.2vw, 0.75rem);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: clamp(0.05em, 0.15vw, 0.1em);
      white-space: nowrap;
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards;
    }

    /* Decorative corner accents */
    .corner {
      position: absolute;
      width: clamp(30px, 6vw, 60px);
      height: clamp(30px, 6vw, 60px);
      opacity: 0.6;
    }

    .corner--tl {
      top: clamp(10px, 2vh, 20px);
      left: clamp(10px, 2vw, 20px);
      border-top: clamp(2px, 0.4vw, 3px) solid var(--yellow);
      border-left: clamp(2px, 0.4vw, 3px) solid var(--yellow);
    }

    .corner--br {
      bottom: clamp(10px, 2vh, 20px);
      right: clamp(10px, 2vw, 20px);
      border-bottom: clamp(2px, 0.4vw, 3px) solid var(--pink);
      border-right: clamp(2px, 0.4vw, 3px) solid var(--pink);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="shape shape--circle-yellow"></div>
    <div class="shape shape--circle-pink"></div>
    <div class="shape shape--square-yellow"></div>
    <div class="shape shape--square-pink"></div>
    <div class="shape shape--dot-row"></div>
    <div class="shape shape--ring"></div>

    <div class="corner corner--tl"></div>
    <div class="corner corner--br"></div>

    <div class="content">
      <div class="tag-line">OpenClaw AI Agent</div>
      <h1 class="title">OpenClaw <span class="title-accent">知识图谱</span></h1>
      <p class="subtitle">从部署到实践全指南</p>
      <div class="features">
        <span class="feature-pill">三层架构</span>
        <span class="feature-pill">四层记忆</span>
        <span class="feature-pill">8大场景</span>
      </div>
    </div>

    <div class="label">Style E: Creative Voltage &middot; Energetic retro-modern</div>
  </div>
</body>
</html>
