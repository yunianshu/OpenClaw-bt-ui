<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 知识图谱 — Vintage Editorial</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f0e8;
      --brown: #2c2416;
      --burgundy: #8b2635;
      --gold: #c9a84c;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--cream);
      color: var(--brown);
      font-family: 'Lora', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .slide {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1200px;
      max-height: 675px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 5rem) clamp(2.5rem, 7vw, 8rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 2.5vw, 2rem);
    }

    /* Decorative top flourish */
    .flourish {
      opacity: 0;
      animation: fadeUp 1.2s ease-out 0.3s forwards;
    }

    .flourish svg {
      width: clamp(120px, 18vw, 220px);
      height: auto;
      fill: var(--gold);
    }

    /* Main title */
    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2.8rem, 7vw, 6.5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--brown);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1.2s ease-out 0.6s forwards;
    }

    /* Subtitle / pull-quote */
    .subtitle {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1rem, 2.2vw, 1.8rem);
      color: var(--burgundy);
      text-align: center;
      max-width: clamp(320px, 55vw, 700px);
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 1.2s ease-out 0.9s forwards;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      gap: clamp(0.6rem, 1.5vw, 1.2rem);
      opacity: 0;
      animation: fadeUp 1.2s ease-out 1.1s forwards;
    }

    .divider-line {
      width: clamp(40px, 6vw, 80px);
      height: 1px;
      background: var(--gold);
    }

    .divider-diamond {
      width: clamp(6px, 0.8vw, 10px);
      height: clamp(6px, 0.8vw, 10px);
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* Tagline */
    .tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(1rem, 2.4vw, 1.9rem);
      color: var(--brown);
      text-align: center;
      font-weight: 400;
      opacity: 0;
      animation: fadeUp 1.2s ease-out 1.3s forwards;
    }

    /* Brief points */
    .points {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.4rem, 1vw, 0.75rem);
      opacity: 0;
      animation: fadeUp 1.2s ease-out 1.5s forwards;
    }

    .point {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(0.75rem, 1.5vw, 1.15rem);
      color: var(--brown);
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .point-sep {
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--gold);
      font-style: normal;
      font-size: clamp(0.5rem, 1vw, 0.8rem);
      margin: clamp(0.1rem, 0.3vw, 0.3rem) 0;
    }

    /* Bottom label */
    .label {
      position: absolute;
      bottom: clamp(0.8rem, 2vw, 1.5rem);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(0.5rem, 1vw, 0.72rem);
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 2s forwards;
    }

    /* Bottom flourish */
    .flourish-bottom {
      opacity: 0;
      animation: fadeUp 1.2s ease-out 1.7s forwards;
    }

    .flourish-bottom svg {
      width: clamp(80px, 12vw, 140px);
      height: auto;
      fill: var(--gold);
      transform: rotate(180deg);
    }

    /* Keyframes */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="slide">
    <!-- Top flourish -->
    <div class="flourish">
      <svg viewBox="0 0 200 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 5 Q60 5 40 15 Q20 25 5 20 Q0 18 10 15 Q20 12 40 15 Q60 18 100 15 Q140 18 160 15 Q180 12 190 15 Q200 18 195 20 Q180 25 160 15 Q140 5 100 5 Z"/>
        <circle cx="100" cy="15" r="3"/>
        <circle cx="30" cy="16" r="1.5"/>
        <circle cx="170" cy="16" r="1.5"/>
      </svg>
    </div>

    <!-- Title -->
    <h1 class="title">OpenClaw 知识图谱</h1>

    <!-- Subtitle pull-quote -->
    <p class="subtitle">从部署到实践全指南</p>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Tagline -->
    <p class="tagline">"关于 AI 助手，你可能一直理解错了"</p>

    <!-- Brief points -->
    <div class="points">
      <span class="point">它不是聊天机器人</span>
      <span class="point-sep">&#10022;</span>
      <span class="point">它不只是工具</span>
      <span class="point-sep">&#10022;</span>
      <span class="point">它是你数字替身</span>
    </div>

    <!-- Bottom flourish -->
    <div class="flourish-bottom">
      <svg viewBox="0 0 200 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 5 Q60 5 40 15 Q20 25 5 20 Q0 18 10 15 Q20 12 40 15 Q60 18 100 15 Q140 18 160 15 Q180 12 190 15 Q200 18 195 20 Q180 25 160 15 Q140 5 100 5 Z"/>
        <circle cx="100" cy="15" r="3"/>
        <circle cx="30" cy="16" r="1.5"/>
        <circle cx="170" cy="16" r="1.5"/>
      </svg>
    </div>

    <!-- Label -->
    <div class="label">Style I: Vintage Editorial &middot; Witty personality</div>
  </div>
</body>
</html>
