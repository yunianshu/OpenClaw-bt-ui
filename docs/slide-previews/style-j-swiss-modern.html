<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 知识图谱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      width: 100%;
      height: 100%;
      max-width: 1200px;
      max-height: 675px;
      padding: clamp(2rem, 5vw, 4rem) clamp(2.5rem, 6vw, 5rem);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      grid-template-columns: 1fr;
      gap: clamp(1.5rem, 3vw, 2.5rem);
    }

    .header {
      display: grid;
      grid-template-rows: auto auto;
      gap: clamp(0.5rem, 1vw, 0.875rem);
      opacity: 0;
      transform: translateY(-1.5rem);
      animation: revealDown 0.5s ease-out 0.1s forwards;
    }

    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .subtitle {
      font-size: clamp(0.875rem, 1.8vw, 1.25rem);
      font-weight: 300;
      color: #555555;
      letter-spacing: 0.02em;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e5e5e5;
      opacity: 0;
      animation: revealFade 0.4s ease-out 0.3s forwards;
    }

    .data-row {
      display: flex;
      align-items: center;
      gap: clamp(1.5rem, 3vw, 2.5rem);
      opacity: 0;
      animation: revealFade 0.4s ease-out 0.4s forwards;
    }

    .data-item {
      font-size: clamp(0.75rem, 1.3vw, 1rem);
      font-weight: 400;
      color: #0d0d0d;
      white-space: nowrap;
    }

    .data-item:not(:last-child)::after {
      content: '';
      display: inline-block;
      width: 3px;
      height: 3px;
      background: #e63329;
      border-radius: 50%;
      margin-left: clamp(1.5rem, 3vw, 2.5rem);
      vertical-align: middle;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(1rem, 2vw, 1.5rem);
      align-content: center;
    }

    .feature {
      display: flex;
      flex-direction: column;
      gap: clamp(0.5rem, 1vw, 0.75rem);
      padding: clamp(1rem, 2vw, 1.5rem);
      border: 1px solid #e5e5e5;
      opacity: 0;
      transform: translateY(1rem);
      animation: revealUp 0.4s ease-out forwards;
    }

    .feature:nth-child(1) { animation-delay: 0.5s; }
    .feature:nth-child(2) { animation-delay: 0.6s; }
    .feature:nth-child(3) { animation-delay: 0.7s; }
    .feature:nth-child(4) { animation-delay: 0.8s; }

    .feature-label {
      font-size: clamp(1.5rem, 3vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0d0d0d;
    }

    .feature-sub {
      font-size: clamp(0.625rem, 0.9vw, 0.75rem);
      font-weight: 300;
      color: #888888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: clamp(0.75rem, 1.5vw, 1.25rem);
      border-top: 1px solid #e5e5e5;
      opacity: 0;
      animation: revealFade 0.4s ease-out 0.9s forwards;
    }

    .footer-label {
      font-size: clamp(0.5625rem, 0.8vw, 0.6875rem);
      font-weight: 400;
      color: #aaaaaa;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .footer-accent {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .footer-dot {
      width: clamp(0.375rem, 0.5vw, 0.5rem);
      height: clamp(0.375rem, 0.5vw, 0.5rem);
      background: #e63329;
      border-radius: 50%;
    }

    .footer-text {
      font-size: clamp(0.5625rem, 0.8vw, 0.6875rem);
      font-weight: 300;
      color: #bbbbbb;
      letter-spacing: 0.04em;
    }

    @keyframes revealDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes revealUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes revealFade {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="slide">
    <header class="header">
      <h1 class="title">OpenClaw 知识图谱</h1>
      <p class="subtitle">从部署到实践全指南</p>
    </header>

    <div class="divider"></div>

    <div class="data-row">
      <span class="data-item">45 页</span>
      <span class="data-item">5 大章节</span>
      <span class="data-item">8 大场景</span>
      <span class="data-item">3 种部署方式</span>
    </div>

    <section class="features">
      <div class="feature">
        <span class="feature-label">架构</span>
        <span class="feature-sub">Architecture</span>
      </div>
      <div class="feature">
        <span class="feature-label">记忆</span>
        <span class="feature-sub">Memory</span>
      </div>
      <div class="feature">
        <span class="feature-label">部署</span>
        <span class="feature-sub">Deployment</span>
      </div>
      <div class="feature">
        <span class="feature-label">场景</span>
        <span class="feature-sub">Scenarios</span>
      </div>
    </section>

    <footer class="footer">
      <span class="footer-label">OpenClaw AI Agent · 知识图谱</span>
      <div class="footer-accent">
        <span class="footer-dot"></span>
        <span class="footer-text">Style J: Swiss Modern · Minimal precise</span>
      </div>
    </footer>
  </div>
</body>
</html>
