    :root {
        --bg: #07090f;
        --bg-card: #0d1520;
        --bg-card-hover: #111a28;
        --accent: #00e5cc;
        --accent-dim: rgba(0, 229, 204, 0.6);
        --text: #e0e8f0;
        --text-muted: #5a7a8a;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(0, 229, 204, 0.25);
        --font-display: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        --font-body: 'Noto Sans SC', sans-serif;
        --header-h: 58px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
    }

    /* ===== HEADER ===== */
    .header {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        height: var(--header-h);
        background: rgba(7, 9, 15, 0.98);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 229, 204, 0.1);
        display: flex; align-items: center;
        padding: 0 1.5rem; gap: 1rem;
    }
    .header-badge {
        font-family: var(--font-display);
        font-size: 0.7rem; color: var(--accent);
        text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600;
    }
    .header-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
    .header-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text); }
    .header-title span { color: var(--accent); }

    /* ===== LAYOUT ===== */
    .layout { display: flex; height: 100vh; padding-top: var(--header-h); }

    /* ===== LEFT COL (20%) ===== */
    .left-col {
        width: 20%; min-width: 240px; max-width: 320px;
        height: 100%; overflow-y: auto;
        background: var(--bg);
        border-right: 1px solid rgba(0, 229, 204, 0.08);
        display: flex; flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 229, 204, 0.2) transparent;
    }
    .left-col::-webkit-scrollbar { width: 4px; }
    .left-col::-webkit-scrollbar-track { background: transparent; }
    .left-col::-webkit-scrollbar-thumb { background: rgba(0, 229, 204, 0.2); border-radius: 2px; }

    .left-header {
        padding: 1.2rem 1rem 0.8rem;
        border-bottom: 1px solid var(--border);
        position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .left-header-title {
        font-family: var(--font-display); font-size: 0.75rem;
        color: var(--accent); text-transform: uppercase;
        letter-spacing: 0.12em; margin-bottom: 0.8rem;
    }
    .left-header-count { font-size: 0.7rem; color: var(--text-muted); padding-bottom: 0.8rem; }
    .left-header-count strong { color: var(--accent); font-weight: 600; }

    /* ===== CARDS ===== */
    .cards-list { flex: 1; padding: 0.6rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .style-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative; overflow: hidden;
    }
    .style-card:hover { transform: translateX(3px); border-color: var(--border-hover); }
    .style-card.selected { border-color: var(--card-accent, var(--accent)); box-shadow: 0 0 20px rgba(0,0,0,0.4); }

    /* MINI PREVIEW */
    .card-preview { height: 140px; position: relative; overflow: hidden; flex-shrink: 0; }
    .card-preview iframe { width: 100%; height: 100%; border: none; transform-origin: top left; }

    /* CARD INFO */
    .card-info { padding: 0.75rem 0.9rem; }
    .card-name { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
    .card-desc { font-size: 0.65rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 0.4rem; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .card-tag {
        font-family: var(--font-display); font-size: 0.55rem; font-weight: 600;
        padding: 0.15em 0.5em; border-radius: 4px;
        background: rgba(255,255,255,0.05); color: var(--text-muted);
        border: 1px solid rgba(255,255,255,0.08);
    }

    /* SELECTED INDICATOR */
    .selected-badge {
        position: absolute; top: 0.5rem; right: 0.5rem;
        font-family: var(--font-display); font-size: 0.55rem; font-weight: 700;
        background: var(--card-accent, var(--accent)); color: #000;
        padding: 0.2em 0.5em; border-radius: 4px;
        text-transform: uppercase; letter-spacing: 0.05em;
        opacity: 0; transition: opacity 0.2s;
    }
    .style-card.selected .selected-badge { opacity: 1; }

    /* ===== RIGHT COL (80%) ===== */
    .right-col { flex: 1; height: 100%; display: flex; flex-direction: column; background: #000; }

    .preview-bar {
        height: 48px; background: rgba(13, 21, 32, 0.95);
        backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 1.25rem; flex-shrink: 0;
    }
    .preview-bar-left { display: flex; align-items: center; gap: 0.75rem; }
    .preview-bar-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--accent); box-shadow: 0 0 8px var(--accent);
        animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .preview-bar-label { font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .btn-fullscreen {
        font-family: var(--font-display); font-size: 0.72rem; font-weight: 600;
        padding: 0.4em 1em; background: rgba(0, 229, 204, 0.1); color: var(--accent);
        border: 1px solid rgba(0, 229, 204, 0.25); border-radius: 6px;
        cursor: pointer; text-decoration: none;
        display: inline-flex; align-items: center; gap: 0.4rem;
        transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .btn-fullscreen:hover { background: rgba(0, 229, 204, 0.2); border-color: var(--accent); transform: translateY(-1px); }

    .preview-frame { flex: 1; width: 100%; border: none; background: #000; display: block; }

    /* ===== CARD ACCENT COLORS ===== */
    .style-card[data-style="a"] { --card-accent: #ff3b3b; }
    .style-card[data-style="b"] { --card-accent: #00ff41; }
    .style-card[data-style="c"] { --card-accent: #c4a35a; }

    .style-card[data-style="j"] { --card-accent: #e63329; }
    .style-card[data-style="k"] { --card-accent: #8b7355; }

    .style-card[data-style="a"] .card-preview { background: #08080c; }
    .style-card[data-style="b"] .card-preview { background: #050a05; }
    .style-card[data-style="c"] .card-preview { background: #0b0d0b; }

    .style-card[data-style="j"] .card-preview { background: #ffffff; }
    .style-card[data-style="k"] .card-preview { background: #f4efe6; }

// State
let selectedId = 'a';

// DOM refs
const cardsList = document.getElementById('cardsList');
const previewLabel = document.getElementById('previewLabel');
const btnFullscreen = document.getElementById('btnFullscreen');
const previewFrame = document.getElementById('previewFrame');

// Build cards
function buildCards() {
    cardsList.innerHTML = '';
    presentations.forEach(p => {
        const card = document.createElement('div');
        card.className = 'style-card' + (p.id === selectedId ? ' selected' : '');
        card.dataset.style = p.id;
        card.dataset.id = p.id;

        const tagsHtml = p.tags.map(t => `<span class="card-tag">${t}</span>`).join('');

        card.innerHTML = `
            <div class="selected-badge">当前选中</div>
            <div class="card-preview">${p.preview}</div>
            <div class="card-info">
                <div class="card-name">${p.name}</div>
                <div class="card-desc">${p.desc}</div>
                <div class="card-tags">${tagsHtml}</div>
            </div>
        `;

        card.addEventListener('click', () => selectPresentation(p));
        cardsList.appendChild(card);
    });

    document.getElementById('totalCount').textContent = presentations.length;
}

// Select presentation
function selectPresentation(p) {
    selectedId = p.id;

    // Update card states
    document.querySelectorAll('.style-card').forEach(c => {
        c.classList.toggle('selected', c.dataset.id === p.id);
    });

    // Update preview
    previewLabel.textContent = p.name;
    btnFullscreen.href = p.file;
    previewFrame.src = p.previewFile;
}

// Initialize
buildCards();
</script>
